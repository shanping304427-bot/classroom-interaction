<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>课堂互动 - 学生端</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h2 span {
            font-size: 1.4rem;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }
        input, textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:active {
            transform: scale(0.98);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .btn-success {
            background: linear-gradient(135deg, #2ed573 0%, #26c063 100%);
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #ff3838 100%);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #666;
            font-size: 0.9rem;
        }
        .info-value {
            font-weight: 600;
            color: #333;
        }
        .status-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .status-open {
            background: #d4edda;
            color: #155724;
        }
        .status-closed {
            background: #f8d7da;
            color: #721c24;
        }
        .vote-option {
            display: block;
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vote-option:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }
        .vote-option.selected {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        .vote-option.voted {
            background: #d4edda;
            border-color: #2ed573;
            cursor: default;
        }
        .tab-bar {
            display: flex;
            background: white;
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .danmaku-input {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .danmaku-input input {
            flex: 1;
        }
        .danmaku-input button {
            width: auto;
            padding: 14px 24px;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 10px;
            z-index: 1000;
            font-size: 1rem;
        }
        .hidden {
            display: none !important;
        }
        .welcome-text {
            text-align: center;
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 课堂互动</h1>
        
        <!-- 加入课堂 -->
        <div id="joinSection" class="card">
            <h2><span>👋</span>加入课堂</h2>
            <p class="welcome-text">请输入你的个人信息加入课堂，参与签到、投票和互动</p>
            
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="studentName" placeholder="你的姓名">
            </div>
            <div class="form-group">
                <label>学号</label>
                <input type="text" id="studentId" placeholder="你的学号">
            </div>
            <div class="form-group">
                <label>班级（选填）</label>
                <input type="text" id="className" placeholder="例如：电商2301">
            </div>
            <button onclick="joinClassroom()">加入课堂</button>
        </div>

        <!-- 主界面 -->
        <div id="mainSection" class="hidden">
            <!-- 课堂信息 -->
            <div class="card">
                <h2><span>📋</span>课堂信息</h2>
                <div class="info-row">
                    <span class="info-label">课堂名称</span>
                    <span class="info-value" id="roomName">-</span>
                </div>
                <div class="info-row">
                    <span class="info-label">签到状态</span>
                    <span id="checkinStatus"><span class="status-badge status-closed">未开启</span></span>
                </div>
            </div>

            <!-- 签到按钮 -->
            <div class="card" id="checkinCard">
                <h2><span>✅</span>签到签退</h2>
                <p style="color: #666; margin-bottom: 15px; line-height: 1.5;">
                    点击下方按钮进行签到或签退。请确保信息准确。
                </p>
                <button class="btn-success" id="checkinBtn" onclick="doCheckin('in')" style="margin-bottom: 10px;">
                    📍 立即签到
                </button>
                <button class="btn-danger" id="checkoutBtn" onclick="doCheckin('out')">
                    🚪 签退离开
                </button>
            </div>

            <!-- 功能标签页 -->
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('vote')">🗳️ 投票</div>
                <div class="tab" onclick="switchTab('question')">❓ 提问</div>
                <div class="tab" onclick="switchTab('danmaku')">💬 弹幕</div>
            </div>

            <!-- 投票 -->
            <div id="voteTab" class="tab-content active">
                <div class="card">
                    <h2><span>🗳️</span>实时投票</h2>
                    <div id="noVote">
                        <p style="color: #999; text-align: center; padding: 30px 0;">
                            暂无进行中的投票<br>请等待老师发起
                        </p>
                    </div>
                    <div id="activeVote" class="hidden">
                        <p style="font-weight: 600; margin-bottom: 15px; color: #333;" id="voteQuestion"></p>
                        <div id="voteOptions"></div>
                    </div>
                    <div id="votedResult" class="hidden">
                        <p style="color: #2ed573; text-align: center; font-weight: 600;">
                            ✓ 投票成功！感谢参与
                        </p>
                    </div>
                </div>
            </div>

            <!-- 提问 -->
            <div id="questionTab" class="tab-content">
                <div class="card">
                    <h2><span>❓</span>向老师提问</h2>
                    <div class="form-group">
                        <textarea id="questionContent" placeholder="请输入你的问题..."></textarea>
                    </div>
                    <button onclick="submitQuestion()">提交问题</button>
                    <p style="color: #999; font-size: 0.85rem; margin-top: 12px; text-align: center;">
                        你的问题会实时显示在老师端
                    </p>
                </div>
            </div>

            <!-- 弹幕 -->
            <div id="danmakuTab" class="tab-content">
                <div class="card">
