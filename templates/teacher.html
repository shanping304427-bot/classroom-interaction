<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课堂互动 - 教师端</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .setup-panel {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .btn-danger {
            background: #ff4757;
        }
        .btn-danger:hover {
            background: #ff3838;
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }
        .btn-success {
            background: #2ed573;
        }
        .btn-success:hover {
            background: #26c063;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
        .info-card h3 {
            color: #667eea;
            margin-bottom: 15px;
        }
        .link-box {
            background: #e8f4f8;
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 14px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .panel {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .panel h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .panel h2 span {
            font-size: 1.5rem;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-card h4 {
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .stat-card p {
            opacity: 0.9;
            font-size: 0.9rem;
        }
        .student-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .student-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
        }
        .student-item:last-child {
            border-bottom: none;
        }
        .student-info h4 {
            color: #333;
            font-size: 0.95rem;
        }
        .student-info p {
            color: #999;
            font-size: 0.8rem;
        }
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-in {
            background: #d4edda;
            color: #155724;
        }
        .status-out {
            background: #f8d7da;
            color: #721c24;
        }
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        .vote-form {
            margin-top: 15px;
        }
        .vote-form input {
            margin-bottom: 10px;
        }
        .vote-options {
            margin: 15px 0;
        }
        .vote-option-input {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .vote-option-input input {
            flex: 1;
        }
        .vote-option-input button {
            padding: 10px 15px;
        }
        .vote-results {
            margin-top: 15px;
        }
        .vote-bar {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }
        .vote-bar-label {
            width: 100px;
            font-size: 0.9rem;
            color: #666;
        }
        .vote-bar-track {
            flex: 1;
            height: 30px;
            background: #f0f0f0;
            border-radius: 15px;
            overflow: hidden;
            position: relative;
        }
        .vote-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            min-width: 40px;
        }
        .vote-bar-count {
            margin-left: 10px;
            font-weight: 600;
            color: #667eea;
        }
        .question-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .question-author {
            font-weight: 600;
            color: #667eea;
            font-size: 0.9rem;
        }
        .question-time {
            font-size: 0.75rem;
            color: #999;
        }
        .question-content {
            color: #333;
            line-height: 1.5;
        }
        .danmaku-screen {
            height: 200px;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }
        .danmaku-item {
            position: absolute;
            white-space: nowrap;
            color: white;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            animation: danmaku-move 8s linear;
        }
        @keyframes danmaku-move {
            from { transform: translateX(100%); left: 100%; }
            to { transform: translateX(-100%); left: -100%; }
        }
        .control-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .hidden {
            display: none;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎓 课堂互动系统</h1>
        
        <!-- 创建课堂 -->
        <div id="setupSection" class="setup-panel">
            <h2>创建新课堂</h2>
            <div class="form-group">
                <label>课堂名称</label>
                <input type="text" id="className" placeholder="例如：跨境电商运营实战">
            </div>
            <div class="form-group">
                <label>教师姓名（选填）</label>
                <input type="text" id="teacherName" placeholder="你的名字">
            </div>
            <button onclick="createClassroom()">创建课堂</button>
        </div>

        <!-- 课堂信息 -->
        <div id="classInfo" class="setup-panel hidden">
            <h3>📋 课堂信息</h3>
            <p><strong>课堂名称：</strong><span id="displayClassName"></span></p>
            <p><strong>签到码：</strong><span id="checkinCode" style="font-size: 2rem; color: #667eea; font-weight: bold;"></span></p>
            <div class="info-card">
                <h3>🔗 分享给学生</h3>
